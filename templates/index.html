{% extends 'base.html' %}

{% block title %}專案派工進度{% endblock %}

{% block content %}


<main class="flex-1 flex flex-col items-center justify-center p-6 w-full max-w-[1000px] mx-auto mt-16 md:mt-0">
    <div class="flex flex-col items-center text-center gap-4 mb-16">
        <div
            class="size-12 rounded-2xl bg-white dark:bg-slate-800 shadow-sm border border-slate-100 dark:border-slate-700 flex items-center justify-center mb-2">
            <svg class="size-6 text-primary" fill="none" viewbox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
                <path clip-rule="evenodd"
                    d="M47.2426 24L24 47.2426L0.757355 24L24 0.757355L47.2426 24ZM12.2426 21H35.7574L24 9.24264L12.2426 21Z"
                    fill="currentColor" fill-rule="evenodd"></path>
            </svg>
        </div>
        <h1 class="text-4xl md:text-5xl font-bold tracking-tight text-slate-900 dark:text-white">專案派工進度</h1>
        <p class="text-lg md:text-xl text-slate-500 dark:text-slate-400 max-w-md">系統營運與派工管理中心</p>
    </div>
    
    <!-- Dashboard Stats -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 w-full mb-10">
        <div class="bg-white dark:bg-slate-800/80 border border-slate-200 dark:border-slate-700/50 rounded-2xl p-6 flex items-center gap-4 shadow-sm">
            <div class="p-4 rounded-full bg-blue-50 dark:bg-blue-900/30 text-blue-500">
                <span class="material-symbols-outlined text-3xl">play_circle</span>
            </div>
            <div>
                <div class="text-sm font-medium text-slate-500 dark:text-slate-400">進行中專案</div>
                <div class="text-2xl font-bold text-slate-900 dark:text-white">{{ active_projects }} 個</div>
            </div>
        </div>
        
        <div class="bg-white dark:bg-slate-800/80 border border-slate-200 dark:border-slate-700/50 rounded-2xl p-6 flex items-center gap-4 shadow-sm">
            <div class="p-4 rounded-full bg-green-50 dark:bg-green-900/30 text-green-500">
                <span class="material-symbols-outlined text-3xl">today</span>
            </div>
            <div>
                <div class="text-sm font-medium text-slate-500 dark:text-slate-400">本月投入工時</div>
                <div class="text-2xl font-bold text-slate-900 dark:text-white">{{ monthly_work_days }} 天</div>
            </div>
        </div>
        
        <div class="bg-white dark:bg-slate-800/80 border border-slate-200 dark:border-slate-700/50 rounded-2xl p-6 flex items-center gap-4 shadow-sm">
            <div class="p-4 rounded-full bg-purple-50 dark:bg-purple-900/30 text-purple-500">
                <span class="material-symbols-outlined text-3xl">group</span>
            </div>
            <div>
                <div class="text-sm font-medium text-slate-500 dark:text-slate-400">登錄員工數</div>
                <div class="text-2xl font-bold text-slate-900 dark:text-white">{{ total_personnel }} 人</div>
            </div>
        </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 w-full">
        <a href="{{ url_for('add_task') }}" class="group flex flex-col items-center justify-center p-10 bg-white dark:bg-slate-800/80 border
            border-slate-200 dark:border-slate-700/50 rounded-2xl cursor-pointer hover:-translate-y-1
            hover:shadow-[0_8px_30px_rgb(0,0,0,0.04)] dark:hover:shadow-[0_8px_30px_rgb(0,0,0,0.2)]
            hover:border-slate-300 dark:hover:border-slate-600 transition-all duration-300">
            <div
                class="mb-6 p-4 rounded-full bg-slate-50 dark:bg-slate-900/50 text-slate-500 dark:text-slate-400 group-hover:bg-primary/10 group-hover:text-primary transition-colors duration-300">
                <span class="material-symbols-outlined text-4xl">add</span>
            </div>
            <h3 class="text-lg font-semibold text-slate-800 dark:text-slate-100 text-center">工作內容填表</h3>
        </a>

        <a href="{{ url_for('employee_case') }}"
            class="group flex flex-col items-center justify-center p-10 bg-white dark:bg-slate-800/80 border border-slate-200 dark:border-slate-700/50 rounded-2xl cursor-pointer hover:-translate-y-1 hover:shadow-[0_8px_30px_rgb(0,0,0,0.04)] dark:hover:shadow-[0_8px_30px_rgb(0,0,0,0.2)] hover:border-slate-300 dark:hover:border-slate-600 transition-all duration-300">
            <div
                class="mb-6 p-4 rounded-full bg-slate-50 dark:bg-slate-900/50 text-slate-500 dark:text-slate-400 group-hover:bg-primary/10 group-hover:text-primary transition-colors duration-300">
                <span class="material-symbols-outlined text-4xl">person</span>
            </div>
            <h3 class="text-lg font-semibold text-slate-800 dark:text-slate-100 text-center">員工表</h3>
        </a>

        <a href="{{ url_for('proj_timeline') }}"
            class="group flex flex-col items-center justify-center p-10 bg-white dark:bg-slate-800/80 border border-slate-200 dark:border-slate-700/50 rounded-2xl cursor-pointer hover:-translate-y-1 hover:shadow-[0_8px_30px_rgb(0,0,0,0.04)] dark:hover:shadow-[0_8px_30px_rgb(0,0,0,0.2)] hover:border-slate-300 dark:hover:border-slate-600 transition-all duration-300">
            <div
                class="mb-6 p-4 rounded-full bg-slate-50 dark:bg-slate-900/50 text-slate-500 dark:text-slate-400 group-hover:bg-primary/10 group-hover:text-primary transition-colors duration-300">
                <span class="material-symbols-outlined text-4xl">calendar_today</span>
            </div>
            <h3 class="text-lg font-semibold text-slate-800 dark:text-slate-100 text-center">專案進度表</h3>
        </a>

        <a href="{{ url_for('manage_db') }}"
            class="group flex flex-col items-center justify-center p-10 bg-white dark:bg-slate-800/80 border border-slate-200 dark:border-slate-700/50 rounded-2xl cursor-pointer hover:-translate-y-1 hover:shadow-[0_8px_30px_rgb(0,0,0,0.04)] dark:hover:shadow-[0_8px_30px_rgb(0,0,0,0.2)] hover:border-slate-300 dark:hover:border-slate-600 transition-all duration-300">
            <div
                class="mb-6 p-4 rounded-full bg-slate-50 dark:bg-slate-900/50 text-slate-500 dark:text-slate-400 group-hover:bg-primary/10 group-hover:text-primary transition-colors duration-300">
                <span class="material-symbols-outlined text-4xl">database</span>
            </div>
            <h3 class="text-lg font-semibold text-slate-800 dark:text-slate-100 text-center">資料庫管理</h3>
        </a>
    </div>
</main>
{% endblock %}
